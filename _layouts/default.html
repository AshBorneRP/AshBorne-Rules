<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <title>{{ site.title | default: site.github.repository_name }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
      /* Force vertical sidebar links */
      header ul { list-style: none; padding: 0; margin: 20px 0; }
      header li { margin-bottom: 15px; display: block; border-bottom: 1px solid #333; padding-bottom: 5px; }
      header a { text-decoration: none; color: #ffd700 !0important; font-weight: bold; font-size: 14px; }
      .wrapper { max-width: 1000px; }
      section { float: right; width: 65%; }
      header { float: left; width: 25%; }
      @media print, screen and (max-width: 720px) {
        header, section { float: none; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
        
        <nav>
          {% include nav.md %}
        </nav>
      </header>
      
      <section>
        {{ content }}
      </section>
      
      <footer>
        <p><small>AshBorne RolePlay &copy; 2026</small></p>
      </footer>
    </div>
  </body>
</html>
