<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "AshBorne RolePlay | Rulebook" }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Base Vibe: Dark, Gritty, Premium */
    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      color: #d1d5db; 
      background: #0a0a0a; 
      margin: 0;
      display: flex;
    }

    /* Headings: Cinematic and Bold */
    h1, h2, h3, h4 {
      font-family: 'Cinzel', serif;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 2em;
    }
    
    /* Headings Sizing */
    h1 { font-size: 1.8em; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.2em; color: #ff6600; }

    /* Left Sidebar: Sleek and Website-like */
    header {
      width: 280px;
      height: 100vh;
      background: #111111;
      padding: 40px 25px;
      position: fixed;
      border-right: 1px solid #222;
      overflow-y: auto;
      box-sizing: border-box;
    }
    header h1 { 
      font-size: 24px; 
      color: #ff6600; /* AshBorne Orange */
      border-bottom: none;
      margin-bottom: 5px;
      text-transform: uppercase;
      margin-top: 0;
    }
    header p { 
      font-size: 13px; 
      color: #888; 
      margin-bottom: 40px; 
      font-weight: 300; 
      line-height: 1.5;
    }

    /* Sidebar Navigation Links */
    header ul { list-style: none; padding: 0; margin: 0; }
    header li { margin-bottom: 18px; }
    header a { 
      color: #9ca3af; 
      text-decoration: none; 
      font-size: 13px; 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      transition: all 0.3s ease; 
      display: block; 
    }
    header a:hover { color: #ff6600; padding-left: 8px; }

    /* Main Content Area */
    .wrapper {
      margin-left: 280px;
      padding: 60px 8%;
      max-width: 900px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Formatting for Rules */
    .wrapper a { color: #ff6600; text-decoration: none; font-weight: 600; transition: 0.2s; }
    .wrapper a:hover { color: #ffffff; }
    hr { border: 0; border-top: 1px solid #222; margin: 50px 0; }
    
    blockquote { 
      background: #151515; 
      border-left: 4px solid #ff6600; 
      padding: 15px 20px; 
      color: #bbb; 
      margin-left: 0; 
      font-style: italic;
    }

    /* Mobile Responsive Fixes */
    @media (max-width: 850px) {
      body { display: block; }
      header { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #222; padding: 30px 20px; }
      header ul { display: flex; flex-wrap: wrap; gap: 15px; }
      header li { margin-bottom: 0; }
      .wrapper { margin-left: 0; padding: 40px 20px; }
      h1 { font-size: 1.5em; } 
    }
  </style>
</head>
