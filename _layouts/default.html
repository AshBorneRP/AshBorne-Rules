<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "AshBorne RolePlay" }}</title>
  <style>
    /* General Body Setup */
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #eee;
      background: #111;
      margin: 0;
      display: flex;
    }

    /* Fixed Left Sidebar */
    header {
      width: 260px;
      height: 100vh;
      background: #1a1a1a;
      padding: 30px 20px;
      position: fixed;
      border-right: 1px solid #333;
      overflow-y: auto;
      box-sizing: border-box;
    }
    header h1 { font-size: 22px; color: #ffd700; margin-top: 0; margin-bottom: 5px; }
    header p { font-size: 13px; color: #888; margin-bottom: 30px; }

    /* The Navigation Menu */
    header ul { list-style: none; padding: 0; margin: 0; }
    header li { margin-bottom: 15px; }
    header a { color: #ccc; text-decoration: none; font-size: 15px; font-weight: bold; transition: 0.2s; display: block; }
    header a:hover { color: #ffd700; padding-left: 5px; }

    /* Main Content Area */
    .wrapper {
      margin-left: 260px; /* Same as sidebar width */
      padding: 50px 5%;
      max-width: 800px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Markdown Elements styling */
    .wrapper a { color: #ffd700; text-decoration: none; }
    .wrapper a:hover { text-decoration: underline; }
    hr { border: 0; border-top: 1px solid #333; margin: 40px 0; }
    blockquote { border-left: 4px solid #ffd700; padding-left: 20px; color: #bbb; margin-left: 0; }
    code { background: #222; padding: 2px 5px; border-radius: 3px; font-family: monospace; }

    /* Mobile Responsive */
    @media (max-width: 800px) {
      body { display: block; }
      header { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #333; }
      .wrapper { margin-left: 0; padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>AshBorne RolePlay</h1>
    <p>An 18+ DayZ RolePlay Community</p>

    <nav>
      <ul>
        <li><a href="{{ '/' | relative_url }}">🏠 Philosophy</a></li>
        <li><a href="{{ '/core-rules' | relative_url }}">📜 Core Rules</a></li>
        <li><a href="{{ '/community-values' | relative_url }}">🤝 Community Values</a></li>
        <li><a href="{{ '/general-expectations' | relative_url }}">📙 Expectations</a></li>
        <li><a href="{{ '/roleplay-guidelines' | relative_url }}">🎭 RP Guidelines</a></li>
        <li><a href="{{ '/hostile-roleplay' | relative_url }}">🔫 Hostile & KOS</a></li>
        <li><a href="{{ '/character-kill-policy' | relative_url }}">☠️ CK Policy</a></li>
        <li><a href="{{ '/base-building' | relative_url }}">🏰 Base Building</a></li>
        <li><a href="{{ '/other-rules' | relative_url }}">⚙️ Misc Rules</a></li>
      </ul>
    </nav>
  </header>

  <div class="wrapper">
    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
